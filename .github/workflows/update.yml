# ═══════════════════════════════════════════════════════════════════════════════
# CYBERWATCH DASHBOARD — .github/workflows/update.yml
#
# Runs every hour. Fetches threat intel, enriches the top 15 items with
# Gemini AI (ai_summary, workflow_graph, severity_score), saves intel.json,
# and commits it back so GitHub Pages serves the latest dashboard.
# ═══════════════════════════════════════════════════════════════════════════════

name: Daily Intel Update

on:
  # ── Scheduled trigger: every hour ─────────────────────────────────────────
  schedule:
    - cron: '0 */1 * * *'

  # ── Manual trigger: run from the Actions tab anytime ─────────────────────
  workflow_dispatch:

# ── Top-level permissions: allow the workflow to push commits ─────────────────
permissions:
  contents: write

jobs:
  fetch-and-update:
    name: Fetch Threat Intelligence
    runs-on: ubuntu-latest

    steps:

      # ── Step 1: Check out the repository ──────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ── Step 2: Set up Python ─────────────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # ── Step 3: Cache pip dependencies ────────────────────────────────────
      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('scripts/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      # ── Step 4: Install Python dependencies ───────────────────────────────
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install requests feedparser

      # ── Step 5: Fetch + AI-enrich threat intelligence ─────────────────────
      - name: Fetch threat intelligence
        env:
          # Optional API keys — set in:
          # GitHub repo → Settings → Secrets and variables → Actions → New secret
          OTX_API_KEY:    ${{ secrets.OTX_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          python scripts/fetch_intel.py

      # ── Step 6: Commit and push the updated intel.json ────────────────────
      - name: Commit updated intel data
        run: |
          git config user.name  "CyberWatch Bot"
          git config user.email "cyberwatch-bot@users.noreply.github.com"

          if git diff --quiet data/intel.json; then
            echo "No changes detected in intel.json — skipping commit."
          else
            git add data/intel.json
            git commit -m "chore: intel update + AI enrichment [$(date -u '+%Y-%m-%d %H:%M UTC')]"
            git push
            echo "Successfully committed and pushed updated intel.json"
          fi

      # ── Step 7: Print workflow summary ────────────────────────────────────
      - name: Print summary
        run: |
          echo "### CyberWatch Update Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Run time:** $(date -u)" >> $GITHUB_STEP_SUMMARY
          TOTAL=$(python -c "import json; d=json.load(open('data/intel.json')); print(d['total_items'])")
          AI_ENRICHED=$(python -c "import json; d=json.load(open('data/intel.json')); print(sum(1 for i in d['items'] if i.get('ai_summary')))")
          echo "- **Items fetched:** $TOTAL" >> $GITHUB_STEP_SUMMARY
          echo "- **AI-enriched items:** $AI_ENRICHED" >> $GITHUB_STEP_SUMMARY
          echo "- **Last updated:** $(python -c "import json; d=json.load(open('data/intel.json')); print(d['last_updated'])")" >> $GITHUB_STEP_SUMMARY
          echo "- **GEMINI_API_KEY set:** ${{ secrets.GEMINI_API_KEY != '' }}" >> $GITHUB_STEP_SUMMARY
