name: CyberWatch AI Update
on:
  schedule:
    - cron: '0 */6 * * *' # Every 6 hours
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: pip install requests feedparser
      - name: Run Pipeline
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          OTX_API_KEY: ${{ secrets.OTX_API_KEY }}
        run: python scripts/fetch_intel.py
      - name: Commit & Push
        run: |
          git config user.name "CyberWatch Bot"
          git config user.email "bot@cyberwatch.io"
          git add data/
          git commit -m "Update intel with AI enrichment [skip ci]" || echo "No changes"
          git push