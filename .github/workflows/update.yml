# ═══════════════════════════════════════════════════════════════════════════════
# CYBERWATCH DASHBOARD — .github/workflows/update.yml
# ═══════════════════════════════════════════════════════════════════════════════

name: Daily Intel Update

on:
  schedule:
    - cron: '0 */1 * * *'   # Every hour (change to '0 6 * * *' for once daily)
  workflow_dispatch:         # Manual trigger from Actions tab

jobs:
  fetch-and-update:
    name: Fetch Threat Intelligence
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-requests-feedparser
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install requests feedparser

      - name: Fetch threat intelligence
        env:
          OTX_API_KEY:    ${{ secrets.OTX_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          python scripts/fetch_intel.py

      - name: Commit updated intel data
        run: |
          git config user.name  "CyberWatch Bot"
          git config user.email "cyberwatch-bot@users.noreply.github.com"

          if git diff --quiet data/intel.json; then
            echo "No changes detected in intel.json — skipping commit."
          else
            git add data/intel.json
            git commit -m "chore: intel update [$(date -u '+%Y-%m-%d %H:%M UTC')]"
            git push
            echo "Successfully pushed updated intel.json"
          fi

      - name: Print summary
        run: |
          echo "### CyberWatch Update Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Run time:** $(date -u)" >> $GITHUB_STEP_SUMMARY
          TOTAL=$(python -c "import json; d=json.load(open('data/intel.json')); print(d.get('total_items', len(d.get('items',[]))))" 2>/dev/null || echo "?")
          echo "- **Items fetched:** ${TOTAL}" >> $GITHUB_STEP_SUMMARY
          LAST=$(python -c "import json; d=json.load(open('data/intel.json')); print(d.get('last_updated','?'))" 2>/dev/null || echo "?")
          echo "- **Last updated:** ${LAST}" >> $GITHUB_STEP_SUMMARY
          AI=$(python -c "import json; d=json.load(open('data/intel.json')); items=d.get('items',[]); print(sum(1 for i in items if i.get('ai_summary')))" 2>/dev/null || echo "0")
          echo "- **AI enriched:** ${AI} items" >> $GITHUB_STEP_SUMMARY