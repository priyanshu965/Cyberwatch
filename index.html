<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CyberWatch</title>

  <link rel="stylesheet" href="style.css" />
  <script src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>
</head>

<body>

<header class="site-header">
  <h1>CYBERWATCH</h1>
  <span id="last-updated">Loading...</span>
</header>

<div class="controls">
  <input type="text" id="search" placeholder="Search threats..." />
</div>

<div class="dashboard">

  <!-- SIDEBAR -->
  <aside class="sidebar">

    <div class="sidebar-card">
      <h3>SUMMARY</h3>
      <div id="summary"></div>
    </div>

    <div class="sidebar-card">
      <h3>TOP TTPs</h3>
      <div id="ttp-clusters"></div>
    </div>

    <div class="sidebar-card">
      <h3>ATTACK TRENDS</h3>
      <div id="pattern-box"></div>
    </div>

    <div class="sidebar-card">
      <h3>ATTACK FLOW</h3>
      <div id="attack-graph"></div>
    </div>

  </aside>

  <!-- FEED -->
  <main class="feed">
    <div id="cards-container"></div>
  </main>

</div>

<script src="app.js"></script>
</body>
</html>
