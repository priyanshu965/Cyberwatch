<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CyberWatch</title>

  <link rel="stylesheet" href="style.css" />

  <!-- VIS NETWORK -->
  <script src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>
</head>

<body>

<header>
  <h1>CYBERWATCH</h1>
  <p id="last-updated">Loading...</p>
</header>

<div class="top-bar">
  <input type="text" id="search" placeholder="Search..." />
</div>

<!-- SUMMARY -->
<div id="summary"></div>

<!-- TTP CLUSTERS -->
<div class="box">
  <h3>Top Techniques</h3>
  <div id="ttp-clusters"></div>
</div>

<!-- PATTERNS -->
<div class="box">
  <h3>Attack Trends</h3>
  <div id="pattern-box"></div>
</div>

<!-- GRAPH -->
<div class="box">
  <h3>Attack Flow Graph</h3>
  <div id="attack-graph"></div>
</div>

<!-- FEED -->
<div id="feed"></div>

<script src="app.js"></script>
</body>
</html>
