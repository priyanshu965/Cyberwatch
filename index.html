<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CyberWatch | Visual Intel</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mermaid/dist/mermaid.min.js"></script>
</head>
<body class="glass-theme">
    <div class="bg-effects">
        <div class="grid"></div>
        <div class="glow"></div>
    </div>

    <header class="main-header">
        <div class="logo">CYBER<span>WATCH</span> v2.0</div>
        <nav>
            <button onclick="setView('graph')">Network Graph</button>
            <button onclick="setView('feed')">Intel Feed</button>
            <button id="exportBtn">Export STIX</button>
        </nav>
    </header>

    <main>
        <section id="graph-container" class="view-section">
            <svg id="viz-canvas"></svg>
        </section>

        <section id="feed-container" class="view-section hidden">
            <div id="intel-grid"></div>
        </section>
    </main>

    <div id="side-drawer" class="drawer">
        <button class="close-btn" onclick="closeDrawer()">×</button>
        <div class="drawer-content">
            <h2 id="drawer-title"></h2>
            <div class="severity-badge" id="drawer-severity"></div>
            <div class="ai-box">
                <h3>Technical BLUF</h3>
                <p id="drawer-summary"></p>
            </div>
            <div class="viz-box">
                <h3>Attack Workflow</h3>
                <div id="mermaid-render" class="mermaid"></div>
            </div>
            <div id="drawer-ttps"></div>
            <a id="source-link" href="#" target="_blank" class="main-link">Read Original Analysis →</a>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
